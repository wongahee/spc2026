<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 교육 사이트</title>
</head>
<body>
    <h1>ChatGPT와 함께 배우는 영어 클래스</h1>
    <nav>
        <ul>
            {% for grade in grades %}
                <li><a href="{{ url_for('grade', grade=grade) }}">{{ grade }}학년</a></li>
            {% endfor %}
        </ul>
    </nav>
    {% block content %}{% endblock %}
    <footer>
        <p>&copy; 2026 SPC와 함께하는 파이썬 생성형 AI 개발자 과정</p>
    </footer>
</body>
</html>
