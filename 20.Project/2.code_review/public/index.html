<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코드 취약점 분석기</title>
</head>
<body>
    <h1>코드 취약점 분석기</h1>
    <form id="codeForm">
        <textarea id="code" name="code" rows="15" cols="80" placeholder="소스코드를 입력하세요"></textarea>
        <br>
        <button type="submit">분석 시작</button>
    </form>
    <h2>분석 결과</h2>
    <pre id="result">
        <!-- 결과 출력 영역 -->
    </pre>

    <script>
        document.getElementById('codeForm').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            
            const code = document.getElementById('code').value;
            const result = document.getElementById('result');

            // 1. fetch, post로 소스코드 내용을 보내기
            const response = await fetch("/api/codecheck", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                // body: JSON.stringify({ code:code })  // key:value (value 생략 가능)
                body: JSON.stringify({ code })
            });

            // 2. 결과를 result에 출력
            const data = await response.json();
            console.log(data)

            result.innerHTML = data.result;
        })
    </script>
</body>
</html>
