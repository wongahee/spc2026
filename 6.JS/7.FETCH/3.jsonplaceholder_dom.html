<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <button id="loadBtn">데이터 요청</button>
    <div id="result"></div>
    <script>
        document.getElementById('loadBtn').addEventListener('click', () => {
            fetch('https://jsonplaceholder.typicode.com/todos/1').then((response) => {
                if (!response.ok) {
                    console.log("응답은 왔으나, OK가 아님.", response);
                    throw new Error("알수 없는 오류가 발생했습니다.");
                }
                console.log("성공적인 응답이 왔음. 응답은 여기 담겨있음: ", response)
                return response.json();
            }).then((data) => {
                console.log("최종 파싱이 끝난 JSON 자료구조가 넘어옴: ", data);
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <ul>
                        <li>사용자 ID: ${data.id}</li>
                        <ul>
                            <li>이름: ${data.name}</li>
                            <li>전화번호: ${data.phone}</li>
                            <li>웹사이트: ${data.url}</li>
                        </ul>
                    </ul>
                `;
            })
            .catch((error) => {
                console.log("위 fetch 처리/가공 중 오류 발생", error)
            })
        });
    </script>
</body>
</html>
