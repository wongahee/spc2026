<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 버튼 클릭 시, 화면에 이미지 출력 https://dog.ceo/ -->
    <h1> [DOG CEO] Random Image</h1>
    <button id="loadBtn">강아지 이미지 로딩</button>
    <div id="result"></div>

    <script>
        document.getElementById('loadBtn').addEventListener('click', () => {
            fetch('https://dog.ceo/api/breeds/image/random')
                .then((response) => response.json())
                .then((data) => {
                    if (data.status == "success") {
                        displayResult(data)
                    } else{
                        displayError(data)
                    }
                })
                .catch(error => {
                    console.error("알 수 없는 오류", error);
                    displayError(data)
                });

            function displayResult(data) {
                console.log("화면에 DOM 그리기: ", data);
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `<img src="${data.message}"> width="400px"`;
            }

            function displayError(data) {
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `<p>이미지를 불러올 수 없습니다. ${data.message}</p>`;
            }
        });
    </script>
</body>
</html>
