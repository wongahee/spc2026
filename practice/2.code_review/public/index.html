<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코드 취약점 분석기</title>
    <link rel="stylesheet" href="../public/style.css">
</head>
<body>
    <div class="container">
        <h1>Github 코드 취약점 분석기</h1>
        <form id="urlForm" class="card">
            <h4>GitHub 파일 URL: </h4>
            <input type="text" id="url" name="url" value="https://github.com/lovehyun/tutorial-python/blob/main/11.security/1.sqli/app_weak.py" />
            <h4>분석할 취약점 유형 선택 (복수 선택 가능):</h4>
            <div class="checkbox-group">
                <label><input type="checkbox" name="vulner" value="secret" />민감정보 (하드코딩된 암호)</label>
                <label><input type="checkbox" name="vulner" value="sqli" />SQL Injection</label>
                <label><input type="checkbox" name="vulner" value="xss" />XSS</label>
            </div>
            <button type="submit">Check</button>
        </form>
        <div class="card">
            <h2>소스 코드</h2>
            <pre id="source-code" class="code-viewer">
                <!-- 취약점 코드 출력 영역 -->
            </pre>
        </div>
        <div class="card">
            <h2>분석 결과</h2>
            <pre id="result">
                <!-- 결과 출력 영역 -->
            </pre>
        </div>
    </div>
    <script>
        document.getElementById('urlForm').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            
            const url = document.getElementById('url').value;

            const s_code = document.getElementById('source-code');
            const result = document.getElementById('result');

            // 체크된 취약점 목록 가져오기
            const checked = Array.from(
                document.querySelectorAll('input[name="vulner"]:checked')
            ).map(el => el.value);

            // console.log("선택 취약점:", checked);

            // 선택 안 했을 때
            if (checked.length === 0) {
                alert("취약점 유형을 하나 이상 선택하세요.");
                return;
            }

            const response = await fetch("/api/codecheck", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    url : url,
                    vuln_types : checked
                })
            });

            const data = await response.json();

            s_code.textContent = data.s_code;
            result.textContent = data.result;
        })
    </script>
</body>
</html>
