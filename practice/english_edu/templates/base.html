<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>영어 교육 사이트</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap');

            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'Nunito', 'Noto Sans KR', sans-serif;
                background: #f0f4ff;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            header {
                background: linear-gradient(135deg, #4f7cff 0%, #7c5cfc 100%);
                padding: 16px 32px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            header h1 {
                color: white;
                font-size: 17px;
                font-weight: 800;
            }

            nav ul, .nav-list {
                list-style: none;
                display: flex;
                gap: 6px;
                margin-top: 12px;
            }

            .nav-list li a {
                background: rgba(224, 18, 18, 0.18);
                color: black;
                border-radius: 20px;
                padding: 5px 13px;
                font-size: 13px;
                text-decoration: none;
                border: 1.5px solid transparent;
            }

            nav ul li a {
                background: rgba(255,255,255,0.18);
                color: white;
                border-radius: 20px;
                padding: 5px 13px;
                font-size: 13px;
                font-weight: 600;
                text-decoration: none;
            }


            nav ul li a:hover { background: rgba(255,255,255,0.35); }

            main { flex: 1; padding: 24px 32px; }

            /* 챗봇 */
            .chat-container {
                background: white;
                border-radius: 16px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.07);
                max-width: 520px;
                height: 72vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                margin: 0 auto;
            }

            .chat-header {
                background: linear-gradient(135deg, #4f7cff, #7c5cfc);
                color: white;
                padding: 16px 20px;
                font-size: 15px;
                font-weight: 700;
                text-align: center;
            }

            #result {
                flex: 1;
                padding: 16px;
                overflow-y: auto;
                background: #f8faff;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .message {
                max-width: 72%;
                padding: 10px 14px;
                border-radius: 16px;
                font-size: 14px;
                line-height: 1.5;
                word-break: break-word;
            }

            .bot-message {
                background: #eef1ff;
                color: #1a2340;
                align-self: flex-start;
                border-bottom-left-radius: 4px;
            }

            .user-message {
                background: linear-gradient(135deg, #4f7cff, #7c5cfc);
                color: white;
                align-self: flex-end;
                border-bottom-right-radius: 4px;
            }

            #user-input-form {
                display: flex;
                padding: 12px 16px;
                border-top: 1px solid #f0f2f8;
                gap: 8px;
                align-items: center;
                flex-shrink: 0;
                background: white;
            }

            #user-input {
                flex: 1;
                border: 1.5px solid #e4e9f8;
                border-radius: 24px;
                padding: 9px 16px;
                font-size: 14px;
                font-family: inherit;
                outline: none;
                background: #f8faff;
                transition: border-color 0.15s;
            }

            #user-input:focus { border-color: #4f7cff; background: white; }

            button[type="submit"] {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                background: linear-gradient(135deg, #4f7cff, #7c5cfc);
                border: none;
                cursor: pointer;
                color: white;
                font-size: 16px;
                font-weight: 700;
                transition: opacity 0.15s;
            }

            button[type="submit"]:hover { opacity: 0.85; }

            footer {
                text-align: center;
                padding: 14px;
                font-size: 12px;
                color: #a0aac0;
                background: white;
                border-top: 1px solid #e4e9f8;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>ChatGPT와 함께 배우는 영어 클래스</h1>
            <nav>
                <ul>
                    {% for grade in grades %}
                        <li><a href="{{ url_for('grade', grade=grade) }}">{{ grade }}학년</a></li>
                    {% endfor %}
                </ul>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            <p>&copy; 2026 SPC와 함께하는 파이썬 생성형 AI 개발자 과정</p>
        </footer>
        {% block scripts %}{% endblock %}
    </body>
</html>
