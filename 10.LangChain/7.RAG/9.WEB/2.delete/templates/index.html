<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>RAG 챗봇</h1>
    <div>
        <div>
            <h2>PDF 업로드</h2>
            <form id="upload-form">
                <input type="file" id="file-input" accept=".pdf">
                <button type="submit">업로드</button>
            </form>
            <div>
                <h3>업로드된 파일 목록</h3>
                <ul id="file-list"><!-- 추가될 li 영역 --></ul>
            </div>
        </div>
        <div>
            <h2>질문하기</h2>
            <form id="ask-form">
                <input type="text" id="question-input" placeholder="질문을 입력하세요.">
                <button type="submit">질문</button>
            </form>
            <div id="answer"></div>
        </div>
    </div>
    <script>
        function renderFiles(files) {
            const ul = document.getElementById('file-list');

            ul.innerHTML ='';
            for (const f of files){
                const li = document.createElement('li');
                li.textContent = `${f.source} (청크: ${f.chunks}개)`

                const btn = document.createElement('button');
                btn.textContent = '삭제';
                btn.dataset.source = f.source;  // 나중에 삭제 시 버튼을 구분하고, 내 파일명을 저장해놨다가 보내기 위함

                li.appendChild(btn);
                ul.appendChild(li);
            }
        }

        const ul = document.getElementById('file-list');

        ul.addEventListener('click', async (ev) => {
            const source = ev.target.dataset.source;
            if (!source) return;

            if(!confirm(`'${source}'를 삭제할까요?`)) return

            const response = await fetch('/files/' + encodeURIComponent(source), {
                method: 'DELETE'});
            const data =await response.json();
            console.log("삭제 후 응답: ", data);
            
            if (data.files) {
                renderFiles(data.files);
            }
        });

        async function loadFiles() {
            const response = await fetch('/files');
            const data = await response.json();
            console.log("파일명: ", data)
            renderFiles(data.files)
        }
        loadFiles()

        // 1. "업로드 버튼"을 통해 문서 전송 - fetch('/upload')
        const form = document.getElementById('upload-form');
        
        form.addEventListener('submit', async (ev) => {
            ev.preventDefault();
            
            const fileInput = document.getElementById('file-input').files[0];
            if(!fileInput) return;   // 빈 파일 전송 금지

            const formData = new FormData(form)
            formData.append("file", fileInput)

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            console.log(result);
            
            loadFiles();
        })

        // 2. "질문 버튼"을 통해 질문하기 - fetch('/ask')
        const askForm = document.getElementById('ask-form');
        
        askForm.addEventListener('submit', async (ev) => {
            ev.preventDefault();
            
            const questionBtn = document.getElementById('question-input').value.trim();

            const response = await fetch('/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ question: questionBtn })
            });

            const data = await response.json();
            console.log(data.answer)

            const answerDiv = document.getElementById('answer');
            answerDiv.textContent = data.answer;
        })
    </script>
</body>
</html>
